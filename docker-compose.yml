services:
  postgres:
    image: postgres:16
    container_name: sis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-sis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345}
      POSTGRES_DB: ${DB_NAME:-sis_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/migrations/001_announcements.sql:/docker-entrypoint-initdb.d/02_announcements.sql
      - ./backend/migrations/002_professor_features.sql:/docker-entrypoint-initdb.d/03_professor_features.sql
      - ./backend/data/admin_features.sql:/docker-entrypoint-initdb.d/04_admin_features.sql
      - ./backend/migrations/006_add_users_full_name.sql:/docker-entrypoint-initdb.d/05_full_name.sql
      - ./backend/migrations/009_academic_monitoring.sql:/docker-entrypoint-initdb.d/06_academic_monitoring.sql
      - ./backend/migrations/010_messaging.sql:/docker-entrypoint-initdb.d/07_messaging.sql
      - ./backend/migrations/011_notifications.sql:/docker-entrypoint-initdb.d/08_notifications.sql
      - ./backend/migrations/012_registration_load_policy.sql:/docker-entrypoint-initdb.d/09_registration_load_policy.sql
      - ./backend/migrations/013_classes_registration_fields.sql:/docker-entrypoint-initdb.d/10_classes_registration_fields.sql
      - ./backend/migrations/014_courses_credits_compat.sql:/docker-entrypoint-initdb.d/11_courses_credits_compat.sql
      - ./backend/migrations/015_course_prerequisites.sql:/docker-entrypoint-initdb.d/12_course_prerequisites.sql
      - ./backend/migrations/016_student_chatbot.sql:/docker-entrypoint-initdb.d/13_student_chatbot.sql
      - ./backend/migrations/017_assignments.sql:/docker-entrypoint-initdb.d/14_assignments.sql
      - ./backend/migrations/018_professor_feature_indexes.sql:/docker-entrypoint-initdb.d/15_professor_feature_indexes.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unisphere-network

  redis:
    image: redis:7-alpine
    container_name: sis_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - unisphere-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unisphere_backend
    restart: unless-stopped
    ports:
      - "5001:5050"   # ← changed host port from 5050 to 5001 to avoid conflict
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      PORT: 5050
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - unisphere-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unisphere_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5001/api   # ← fixed: was 5000, now matches backend host port
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - unisphere-network

volumes:
  postgres_data:

networks:
  unisphere-network:
    driver: bridge
